<rect x="40" y="520" width="280" height="72" rx="10" stroke-width="0.5"/>
<text class="th" x="180" y="542" text-anchor="middle" dominant-baseline="central">MongoDB Atlas M20</text>
<text class="ts" x="180" y="560" text-anchor="middle" dominant-baseline="central">3-node replica set · GCP Mumbai</text>
