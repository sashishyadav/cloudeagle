<text class="ts" x="540" y="400" text-anchor="middle" dominant-baseline="central">Outbound egress</text>
<text class="ts" x="540" y="418" text-anchor="middle" dominant-baseline="central">No public IPs on VMs</text>
<text class="ts" x="540" y="436" text-anchor="middle" dominant-baseline="central">Static IP for allowlist</text>
</g>

