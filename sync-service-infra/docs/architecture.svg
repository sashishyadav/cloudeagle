<text class="ts" x="500" y="560" text-anchor="middle" dominant-baseline="central">Cloud Logging · Cloud Monitoring</text>
<text class="ts" x="500" y="578" text-anchor="middle" dominant-baseline="central">PagerDuty + Slack alerts</text>
