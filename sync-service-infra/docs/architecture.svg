<text class="ts" x="495" y="240" text-anchor="middle" dominant-baseline="central">3 instances · e2-medium</text>
</g>
<g class="c-purple">
<rect x="380" y="260" width="230" height="26" rx="6" stroke-width="0.5"/>
<text class="ts" x="495" y="273" text-anchor="middle" dominant-baseline="central">sync-service container · port 8080</text>
</g>
<g class="c-purple">
<rect x="380" y="290" width="230" height="26" rx="6" stroke-width="0.5"/>
<text class="ts" x="495" y="303" text-anchor="middle" dominant-baseline="central">Ops Agent (logs + metrics)</text>
</g>

<g class="c-amber">
<rect x="70" y="360" width="170" height="96" rx="10" stroke-width="0.5"/>
<text class="th" x="155" y="382" text-anchor="middle" dominant-baseline="central">Secret Manager</text>
<text class="ts" x="155" y="400" text-anchor="middle" dominant-baseline="central">Mongo URI, keys</text>
<text class="ts" x="155" y="418" text-anchor="middle" dominant-baseline="central">Per-env paths</text>
<text class="ts" x="155" y="436" text-anchor="middle" dominant-baseline="central">IAM least-priv</text>
</g>

<g class="c-amber">
<rect x="260" y="360" width="170" height="96" rx="10" stroke-width="0.5"/>
