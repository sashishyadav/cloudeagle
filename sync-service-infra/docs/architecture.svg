<svg width="100%" viewBox="0 0 680 720" role="img" xmlns="http://www.w3.org/2000/svg">
<title>sync-service GCP architecture</title>
<desc>Internet traffic flows through Cloud Armor and an HTTPS Load Balancer into a VPC containing two MIGs (zone-a and zone-b). Instances read from MongoDB Atlas via VPC Peering, fetch secrets from Secret Manager, pull images from Artifact Registry, and send logs and metrics to the observability stack.</desc>

<style>
.t { font-family: sans-serif; font-size: 14px; font-weight: 400; fill: #3d3d3a; }
.ts { font-family: sans-serif; font-size: 12px; font-weight: 400; fill: #73726c; }
.th { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #2c2c2a; }
.arr { stroke: #73726c; stroke-width: 1.5; fill: none; }
.leader { stroke: #9c9a92; stroke-width: 0.5; fill: none; stroke-dasharray: 3 3; }

.c-gray rect, .c-gray ellipse, .c-gray circle { fill: #F1EFE8; stroke: #5F5E5A; }
.c-gray .t, .c-gray .th { fill: #2C2C2A; }
.c-gray .ts { fill: #5F5E5A; }

.c-blue rect, .c-blue ellipse, .c-blue circle { fill: #E6F1FB; stroke: #185FA5; }
.c-blue .t, .c-blue .th { fill: #0C447C; }
.c-blue .ts { fill: #185FA5; }

.c-coral rect, .c-coral ellipse, .c-coral circle { fill: #FAECE7; stroke: #993C1D; }
.c-coral .t, .c-coral .th { fill: #712B13; }
.c-coral .ts { fill: #993C1D; }

.c-teal rect, .c-teal ellipse, .c-teal circle { fill: #E1F5EE; stroke: #0F6E56; }
.c-teal .t, .c-teal .th { fill: #085041; }
.c-teal .ts { fill: #0F6E56; }

.c-purple rect, .c-purple ellipse, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
.c-purple .t, .c-purple .th { fill: #3C3489; }
.c-purple .ts { fill: #534AB7; }

.c-amber rect, .c-amber ellipse, .c-amber circle { fill: #FAEEDA; stroke: #854F0B; }
.c-amber .t, .c-amber .th { fill: #633806; }
.c-amber .ts { fill: #854F0B; }

.c-pink rect, .c-pink ellipse, .c-pink circle { fill: #FBEAF0; stroke: #993556; }
.c-pink .t, .c-pink .th { fill: #72243E; }
.c-pink .ts { fill: #993556; }
</style>

<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<text class="th" x="340" y="30" text-anchor="middle">sync-service on GCP — runtime architecture</text>

<g class="c-gray">
<rect x="40" y="60" width="160" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="120" y="80" text-anchor="middle" dominant-baseline="central">Internet clients</text>
<text class="ts" x="120" y="96" text-anchor="middle" dominant-baseline="central">Mobile + web apps</text>
</g>

<g class="c-coral">
<rect x="240" y="60" width="200" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="340" y="80" text-anchor="middle" dominant-baseline="central">Cloud Armor</text>
<text class="ts" x="340" y="96" text-anchor="middle" dominant-baseline="central">WAF, DDoS, rate limiting</text>
</g>

<g class="c-coral">
<rect x="480" y="60" width="160" height="44" rx="8" stroke-width="0.5"/>
<text class="th" x="560" y="80" text-anchor="middle" dominant-baseline="central">HTTPS LB</text>
<text class="ts" x="560" y="96" text-anchor="middle" dominant-baseline="central">TLS, sticky backends</text>
</g>

