<text class="th" x="60" y="162" dominant-baseline="central">VPC — sync-service-vpc</text>
<text class="ts" x="60" y="180" dominant-baseline="central">Private subnets, Cloud NAT, IAP only</text>
</g>

<g class="c-purple">
<rect x="70" y="206" width="270" height="120" rx="12" stroke-width="0.5"/>
